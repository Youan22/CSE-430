<div class="panel panel-default">
  <div class="panel-heading clearfix">
    <h3 class="panel-title pull-left">Contacts</h3>
    <a href="#" class="btn btn-success pull-right">New Contact</a>
  </div>
  <div class="panel-body">
    <div *ngFor="let contact of contacts" class="contact-row clearfix">
      <span class="contact-name pull-left">{{ contact.name }}</span>
      <img
        class="contact-photo pull-right img-responsive"
        src="{{ contact.imageUrl }}"
        alt="{{ contact.name }}"
      />
    </div>
  </div>
</div>
