<div class="page">
  <section class="hero" aria-label="Welcome">
    <div class="hero__image-wrap">
      <img
        class="hero__image"
        src="/images/hero-doctor.png"
        width="800"
        height="400"
        alt=""
        decoding="async"
      />
    </div>
    <div class="hero__content">
      <h2 class="page-title">Your medications</h2>
      <p class="page-lead">Add, edit, or remove entries to match what you’re taking.</p>
    </div>
  </section>

  @if (error) {
    <p class="error" role="alert">{{ error }}</p>
  }

  @if (loading && medications.length === 0) {
    <p>Loading…</p>
  } @else {
    <app-medication-list
      [medications]="medications"
      (add)="openCreate()"
      (edit)="openEdit($event)"
      (deleteId)="onDelete($event)"
    />
  }

  @if (showForm) {
    <div class="form-panel">
      <app-medication-form
        [mode]="formMode"
        [medication]="editingMedication"
        (cancel)="closeForm()"
        (save)="onSave($event)"
      />
    </div>
  }
</div>
