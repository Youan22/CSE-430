<form (ngSubmit)="onSubmit()" [formGroup]="form" class="form">
  <h2>{{ mode === "create" ? "Add medication" : "Edit medication" }}</h2>

  <label class="field">
    <span>Name</span>
    <input type="text" formControlName="name" autocomplete="off" />
  </label>

  <label class="field">
    <span>Dosage</span>
    <input type="text" formControlName="dosage" placeholder="e.g. 10mg" />
  </label>

  <label class="field">
    <span>Frequency</span>
    <select formControlName="frequency">
      @for (f of frequencies; track f.value) {
        <option [value]="f.value">{{ f.label }}</option>
      }
    </select>
  </label>

  <label class="field">
    <span>Instructions</span>
    <textarea formControlName="instructions" rows="3"></textarea>
  </label>

  <label class="field">
    <span>Start date</span>
    <input type="date" formControlName="startDate" />
  </label>

  <label class="field">
    <span>End date (optional)</span>
    <input type="date" formControlName="endDate" />
  </label>

  <label class="field">
    <span>Notes (optional)</span>
    <textarea formControlName="notes" rows="2"></textarea>
  </label>

  <div class="actions">
    <button type="button" class="secondary" (click)="onCancel()">Cancel</button>
    <button type="submit" class="primary">Save</button>
  </div>
</form>
