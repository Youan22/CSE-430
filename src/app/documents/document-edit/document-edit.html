<div class="panel panel-default">
  <div class="panel-body">
    <form id="document-edit" #f="ngForm" (ngSubmit)="onSubmit(f)">
      <div class="row">
        <div class="col-sm-12 form-group">
          <label for="name">Document Title:</label>
          <input
            type="text"
            id="name"
            name="name"
            class="form-control required"
            size="120"
            max="120"
            required
            [ngModel]="document.name"
            (ngModelChange)="document.name = $event"
            #name="ngModel"
          />
        </div>
      </div>

      <div class="row">
        <div class="col-sm-12 form-group">
          <label for="description">Document Description:</label>
          <input
            type="text"
            id="description"
            name="description"
            class="form-control"
            size="120"
            max="255"
            [ngModel]="document.description"
            (ngModelChange)="document.description = $event"
          />
        </div>
      </div>

      <div class="row">
        <div class="col-sm-12 form-group">
          <label for="url">Document URL:</label>
          <input
            type="text"
            id="url"
            name="url"
            class="form-control required"
            size="150"
            max="255"
            required
            [ngModel]="document.url"
            (ngModelChange)="document.url = $event"
            #url="ngModel"
          />
        </div>
      </div>

      <div
        class="alert alert-danger"
        *ngIf="name.invalid || url.invalid"
      >
        The Document Title and Document URL are required fields.
      </div>

      <div class="row">
        <div class="col-xs-12 btn-toolbar">
          <button
            *ngIf="f.valid"
            class="btn btn-success"
            type="submit"
          >
            Save
          </button>
          <button
            *ngIf="f.invalid"
            class="btn btn-success"
            type="button"
            disabled
          >
            Save
          </button>
          <button
            class="btn btn-primary"
            type="button"
            (click)="onCancel()"
          >
            Cancel
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
