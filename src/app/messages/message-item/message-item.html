<a class="list-group-item clearfix">
  <div>
    <span class="messageHeader" *ngIf="messageSender; else unknownSender">
      {{ messageSender }}
    </span>
    <ng-template #unknownSender>
      <span class="messageHeader muted">Unknown sender</span>
    </ng-template>
    <div class="messageText">{{ message.msgText }}</div>
  </div>
</a>
