<a
  class="contact-row clearfix"
  [routerLink]="['/contacts', contact.id]"
  routerLinkActive="active"
>
  <span class="contact-name pull-left">{{ contact.name }}</span>
  <img
    *ngIf="
      contact.imageUrl.trim() || contact.group?.[0]?.imageUrl?.trim()
    "
    class="contact-photo pull-right img-responsive"
    src="{{ contact.imageUrl.trim() ? contact.imageUrl : contact.group?.[0]?.imageUrl }}"
    alt="{{ contact.name }}"
  />
</a>
