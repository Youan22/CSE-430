<div class="panel panel-default" *ngIf="contact">
  <div class="panel-heading">
    <h3 class="panel-title contact-name">{{ contact.name }}</h3>
    <div class="clearfix contact-heading-row">
      <img
        *ngIf="
          contact.imageUrl.trim() || contact.group?.[0]?.imageUrl?.trim()
        "
        class="pull-left img-responsive contact-photo"
        src="{{ contact.imageUrl.trim() ? contact.imageUrl : contact.group?.[0]?.imageUrl }}"
        alt="{{ contact.name }}"
      />
      <div class="pull-right btn-group contact-actions" role="group">
        <a
          class="btn btn-primary"
          [routerLink]="['/contacts', contact.id, 'edit']"
          >Edit</a
        >
        <a
          class="btn btn-danger"
          href="#"
          (click)="onDelete(); $event.preventDefault()"
          >Delete</a
        >
      </div>
    </div>
  </div>
  <div class="panel-body">
    <p><strong>Email:</strong> {{ contact.email }}</p>
    <p><strong>Phone:</strong> {{ contact.phone }}</p>
  </div>
</div>

<div class="panel panel-default" *ngIf="!contact">
  <div class="panel-body">
    <p>Contact not found.</p>
  </div>
</div>
